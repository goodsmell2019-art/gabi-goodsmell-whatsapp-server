services:
  - type: web
    name: gabi-goodsmell-whatsapp-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: VERIFY_TOKEN
        value: goodsmell_gabi_2026
      - key: GRAPH_API_VERSION
        value: v23.0
      - key: PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
